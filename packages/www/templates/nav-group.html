<section class="nav-group">
  <div class="nav-group-header">
    <p>{{A:eyebrow}}</p>
    <h2>{{title}}</h2>
  </div>
  <div class="nav-group-items">
    {{#@:items item}}
      <a
        class="{{item.className}}"
        href="{{item.href}}"
        title="{{item.title}}"
      >
        <span class="nav-item-title">{{item.title}}</span>
        <span class="nav-item-meta">{{.:item.description 76 ...}}</span>
      </a>
    {{/@:items}}
  </div>
</section>
